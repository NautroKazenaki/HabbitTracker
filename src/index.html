<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>  
    <title>HabbitTracker</title>
    <link rel="stylesheet" href="styles.css">

<body>
    <div class="mainContainer">
        <div class="navTab">
            <div class="logoContainer">
                <img src="assets/logo.png" alt="logo">
                <span>Habbit Tracker</span>
            </div>
            <div class="navPanel">
                <div class="navItem">
                    <img src="assets/home.png" alt="home">
                    <span>Главная</span>
                </div>
                <div class="navItem">
                    <img src="assets/habbits.png" alt="habbits">
                    <span>Привычки</span>
                </div>
                <div class="navItem">
                    <img src="assets/statistics.png" alt="statistics">
                    <span>Статистика</span>
                </div>
                <div class="navItem">
                    <img src="assets/achievements.png" alt="achievements">
                    <span>Достижения</span>
                </div>
                <div class="navItem">
                    <img src="assets/challenges.png" alt="challenges">
                    <span>Челленджи</span>
                </div>
                <div class="navItem">
                    <img src="assets/pet.png" alt="pet">
                    <span>Питомец</span>
                </div>
                <div class="navItem">
                    <img src="assets/friends.png" alt="friends">
                    <span>Друзья</span>
                </div>
                <div class="navItem">
                    <img src="assets/settings.png" alt="settings">
                    <span>Настройки</span>
                </div>
            </div>
            <div class="statusPanel">
                <div class="nameContainer">
                    <!-- img -->
                    <div class="profileContainer">
                    <span>Алексей</span>
                    <span>Уровень</span>
                    </div>
                </div>
                <div class="streakContainer">
                    <span>Серия дней</span>
                    <span>
                        <!-- img -->
                    </span>
                    <span>Лучший результат</span>
                </div>
                <button id="newHabbit" class="newHabbittButton">
                    <span>+ Новая привычка</span>
                </button>
            </div>       
        </div>
        <div></div>
    </div>
</body>
</html>
